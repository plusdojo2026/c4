			<!-- 新規追加ボタン -->
          	<button id="add-button" type="button">
            <img class="active" src="/c4/img/add_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg" alt="従業員新規追加"></button>

			<!-- 削除ボタン -->
			<button id="delete-check" class="option">削除</button>
				</div>

        <table>
          <caption>従業員一覧</caption>
          <thead>
            <tr>
			  <!-- 全選択チェックボックス -->
			  <th><input type="checkbox" class="option" id="check-all"></th>
              <th>名前</th>
              <th>生年月日</th>
              <th>権限(管理者/従業員)</th>
            </tr>
          </thead>

          <!-- 従業員のデータ -->
           <tbody id="employee-table-body">
            <c:forEach var="p" items="${accountList}">
				<tr>
				 <td><input type="checkbox" name="employeeIds" value="${p.id}"></td>
				 <td>${p.name}</td>
				 <td>${p.birthday}</td>
                 <td>${p.permissionsId == 1 ? '管理者' : '従業員'}</td>
				</tr>
			</c:forEach>
           </tbody>
        </table>
      </section>
    </main>
  </div>

	</form>


<!-- 削除確認ポップアップ -->

		<p>〇件選択されています。<br>選択した情報を削除しますか？</p>
		<button id="cancel2" class="btn">キャンセル</button>
		<button id="delete" class="btn">削除する</button>
	</dialog>


<!-- 削除結果通知ポップアップ -->
	<dialog class="deleteresult">
		<p>成功: ${success} 件<br>失敗: ${fail} 件</p>
		<c:if test="${fail > 0}">
		<p>削除できませんでした。</p>
		</c:if>
		<button id="cancel3" class="btn">キャンセル</button>
	</dialog>


<!-- 削除通知 -->
	<c:if test="${showDeleteResult}">
		<script>
			document.addEventListener("DOMContentLoaded", () => {
				const dialog4 = document.querySelector(".deleteresult");
					dialog4.showModal();
					requestAnimationFrame(() => {
					dialog4.classList.add("show");
				});
			});
		</script>
	</c:if>
