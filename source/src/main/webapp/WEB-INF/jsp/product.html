<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<title>商品一覧</title>
	<!-- /webappつける -->
	<link rel="stylesheet" href="/webapp/css/common.css">
	<link rel="stylesheet" href="/webapp/css/stock.css">
	<link rel="stylesheet" href="/webapp/css/product.css">

</head>

<body>
	<!-- ここでheader.jspをinclude -->
	<!-- <%@ include file="/WEB-INF/jsp/header.jsp" %> -->

	<!-- sidebarと機能画面のラッパー用div -->
	<div class="wrapper">
		<!-- ここでsidebar.jspをinclude -->
		<!-- <%@ include file="/WEB-INF/jsp/sidebar.jsp" %> -->
		<main class="stock-content">
			<section class="stock-card">
				<div class="video-wrapper">
					<video id="video" autoplay playsinline disablePictureInPicture></video>
					<div class="barcode-frame">

					</div>
				</div>
				<div class="button-wrapper">
					<button id="edit-button">
						<img class="active" src="/webapp/img/edit_square_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg" alt="編集">
					</button>
					<button id="camera-button">
						<img id="camera-on" class="active" src="/webapp/img/videocam_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg"
							alt="カメラON">
						<img id="camera-off" class="" src="/webapp/img/videocam_off_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg"
							alt="カメラOFF">
					</button>
					<!-- 新規追加ボタン -->
					<button id="add-btn">新規追加</button>
				</div>
				<div>
					<!-- 全選択チェックボックス -->
					<input type="checkbox" class="option">
					<!-- 削除ボタン -->
					<button id="delete-check" class="option">削除</button>
				</div>
				<table>
					<thead>
						<tr>
							<th></th>
							<th>商品画像</th>
							<th>JANコード</th>
							<th>商品名</th>
						</tr>
					</thead>
					<tbody id="product-table-body">
						<!-- サーブレット完成次第 -->
						 <!-- <c:forEach var="p" items="${productList}"></c:forEach>
						 <tr>
							<td><input type="checkbox"></td>
                <td><img src="${p.imgPath}"></td>
                <td>${p.jan}</td>
                <td>${p.name}</td>
            </tr>
        </c:forEach> -->
					</tbody>
				</table>
			</section>
		</main>
	</div>
	
	<!-- 新規追加ポップアップ（確認） -->
	<dialog class="newcheck">
		<p>新規商品を追加しますか？</p>
		<button id="closedialog" class="btn">キャンセル</button>
		<button id="add" class="btn">追加する</button>
	</dialog>

	<!-- 新規追加モーダル -->
	<dialog class="newmodal">
		<button id="cancel" class="btn">閉じる</button>
		<img src="#" class="product-photo">
		<form action="product" method="post">
			<div class="newform">
				<input type="text" id="JAN" name="JAN" placeholder="JANを入力" required>
				<input type="text" id="pname" name="productname" placeholder="商品名を入力" required>
				<input type="text" id="term" name="term" placeholder="期間を入力" required>
			</div>
		</form>
		<button type="submit" class="btn regist">登録</button>
	</dialog>

	<!-- 削除確認ポップアップ -->
	 <dialog class="deletecheck">
		<p>〇件選択されています。<br>選択商品を削除しますか？</p>
		<button id="cancel2" class="btn">キャンセル</button>
		<button id="delete" class="btn">削除する</button>
	</dialog>

	<!-- 削除結果通知ポップアップ -->
	 <dialog class="deleteresult">
		<p>成功:〇件<br>失敗:〇件</p>
		<p>「JANコード」は在庫があるため削除できませんでした。</p>
		<button id="cancel3" class="btn">キャンセル</button>
	</dialog>

<!-- 編集ポップアップ -->
	 <dialog class="edit">
		<button id="cancel4" class="btn">閉じる</button>
		<img src="#" class="product-photo">
		<form action="#" method="#">
			<div class="newform">
				<input type="text" id="JAN" name="JAN" placeholder="JANを入力" required>
				<input type="text" id="pname" name="productname" placeholder="商品名を入力" required>
				<input type="text" id="term" name="term" placeholder="期間を入力" required>
			</div>
		</form>
		<button class="btn edit">保存</button>
		<button id="delete-check2" class="btn delete">削除</button>
	</dialog>


	<script src="/webapp/js/product.js"></script>

</body>

</html>
