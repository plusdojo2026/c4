<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<title>サカグラ｜ログイン</title>
	<link rel="stylesheet" href="/webapp/css/login.css">
</head>

<body class="login-reset-page">

	<header>

	</header>
	<div class="login-reset">
		<h1>ログイン</h1>
		<form>

			<p id="msg"></p>
			社員番号とパスワードを入力してください。<br>
			<fieldset class="input-box">
				<legend>社員番号</legend>
				<input type="text" name="employeeNumber">
			</fieldset>

			<fieldset class="input-box">
				<legend>パスワード</legend>
				<input type="password" name="password">
			</fieldset>

			<div class="remember-forgot">
				パスワードを忘れた方は<a href="#">こちら</a>
			</div>

			<div class="login-btn">
				<button type="submit" name="loginBtn" value="ログイン">ログイン</button>
			</div>

		</form>
	</div>
	<footer>

	</footer>
</body>

</html>
